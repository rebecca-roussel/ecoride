services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ecoride_nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.production.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - php
    networks:
      - ecoride_reseau
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ecoride_php
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    env_file:
      - .env.production.local
    environment:
      COMPOSER_HOME: /tmp/composer
    user: "${UID:-1000}:${GID:-1000}"
    depends_on:
      - postgresql
      - mongodb
    networks:
      - ecoride_reseau
    restart: unless-stopped

  postgresql:
    image: postgres:16
    container_name: ecoride_postgresql
    env_file:
      - .env.production.local
    volumes:
      - donnees_postgresql:/var/lib/postgresql/data
    networks:
      - ecoride_reseau
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: ecoride_mongodb
    volumes:
      - donnees_mongodb:/data/db
    networks:
      - ecoride_reseau
    restart: unless-stopped

volumes:
  donnees_postgresql:
  donnees_mongodb:

networks:
  ecoride_reseau:
