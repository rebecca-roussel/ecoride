name: Intégration continue EcoRide

on:
  push:
    branches:
      - develop
      - main
      - correction/**
      - fonctionnalite/**
  pull_request:
    branches:
      - develop
      - main

jobs:
  verification_qualite:
    name: Vérifications qualité
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le dépôt
        uses: actions/checkout@v4

      - name: Installer PHP 8.3 et les extensions requises
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: ctype, iconv, mongodb, pdo_pgsql
          coverage: none

      - name: Vérifier Composer
        run: composer --version

      - name: Installer les dépendances PHP
        run: composer install --no-interaction --prefer-dist --no-progress --no-scripts

      - name: Préparer les variables d'environnement de CI
        run: |
          cat > .env.docker <<'EOF'
          UID=1000
          GID=1000
          APP_ENV=test
          APP_DEBUG=1
          APP_SECRET=secret_ci_non_utilise_en_production
          APP_TIMEZONE=Europe/Paris
          DEFAULT_URI=http://localhost:8080
          POSTGRES_DB=ecoride
          POSTGRES_USER=ecoride
          POSTGRES_PASSWORD=ecoride
          POSTGRES_HOST=postgresql
          POSTGRES_PORT=5432
          DATABASE_URL=pgsql://ecoride:ecoride@postgresql:5432/ecoride
          MONGO_URI=mongodb://mongodb:27017
          MONGO_DB=ecoride_journal
          MONGO_COLLECTION=journal_evenements
          MAILER_DSN=null://null
          COURRIEL_EXPEDITEUR=nepasrepondre@ecoride.fr
          EOF
          cp .env.docker .env

      - name: Vérifier Docker Compose
        run: |
          docker compose version
          docker compose config > /tmp/docker-compose-resolu.yml

      - name: Vérifier la configuration du conteneur Symfony
        run: php bin/console lint:container

      - name: Vérifier la syntaxe Twig
        run: php bin/console lint:twig templates

      - name: Vérifier la syntaxe PHP
        run: find src -type f -name "*.php" -print0 | xargs -0 -n1 php -l

      - name: Exécuter les tests PHPUnit
        run: php bin/phpunit
