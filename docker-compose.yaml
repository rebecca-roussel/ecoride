services:
  nginx:
    image: nginx:1.27-alpine
    container_name: ecoride_nginx
    ports:
      - "127.0.0.1:8080:80"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    restart: unless-stopped

  php:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: ecoride_php
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    environment:
      COMPOSER_HOME: /tmp/composer
    user: "${UID}:${GID}"
    depends_on:
      - postgresql
      - mongodb
    restart: unless-stopped

  postgresql:
    image: postgres:16
    container_name: ecoride_postgresql
    environment:
      POSTGRES_DB: "${POSTGRES_DB}"
      POSTGRES_USER: "${POSTGRES_USER}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD}"
    volumes:
      - donnees_postgresql:/var/lib/postgresql/data
    restart: unless-stopped

  mongodb:
    image: mongo:7
    container_name: ecoride_mongodb
    ports:
      - "127.0.0.1:27017:27017"
    volumes:
      - donnees_mongodb:/data/db
    restart: unless-stopped

  mailhog:
    image: mailhog/mailhog:v1.0.1
    container_name: ecoride_mailhog
    ports:
      - "127.0.0.1:1025:1025"
      - "127.0.0.1:8025:8025"
    restart: unless-stopped

volumes:
  donnees_postgresql:
  donnees_mongodb: